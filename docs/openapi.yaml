openapi: 3.1.0

info:
  title: Vodical Document Generation API
  version: "1.2.0"
  summary: Generate professional documents from text, audio, images, and PDFs.
  description: |
    The Vodical API turns any combination of inputs (raw text, audio recordings,
    images, PDF documents) into a structured HTML document, using a user-defined
    template. The HTML can be rendered as a pixel-perfect A4 PDF client-side
    with the bundled pdf-lib pipeline (see the README of the reference client).

    All endpoints require a Bearer API key starting with `vdc_sk_`.

    ## Changelog

    - **1.2.0** (2026-06): Added `POST /api-v1-transcribe` for audio-only
      transcription (no AI document generation, no template required).
      Returns plain text plus optional speaker segments. New scope
      `transcriptions:write` is auto-granted to existing keys (non-breaking).
    - **1.1.0** (2026-06): Added `PUT /api-v1-templates?id={id}` to update an
      existing template (HTML body, name, language). Useful for "save edits"
      flows in template editors. Non-breaking.
    - **1.0.0**: Initial public release with template CRUD (`GET`, `POST`,
      `DELETE`) and the multi-modal `POST /api-v1-generate` endpoint.

    Companion docs:
      - Integration tutorial: ./README.md
      - Human-readable spec:  ./API.md
  contact:
    name: Vodical
    url: https://vodical.com
  license:
    name: MIT (reference client only — API itself is proprietary)

servers:
  - url: https://your-instance.supabase.co/functions/v1
    description: Vodical API (production / self-hosted)

security:
  - apiKey: []

tags:
  - name: Templates
    description: Manage document templates (the structure used to fill in inputs).
  - name: Documents
    description: Generate documents from a template + inputs.
  - name: Transcriptions
    description: Speech-to-text on raw audio (no AI document generation).

# =============================================================================
# Paths
# =============================================================================
paths:

  /api-v1-templates:
    get:
      tags: [Templates]
      summary: List or fetch templates
      description: |
        Without query parameters, returns the list of all templates owned by
        the authenticated user. With `?id=<uuid>`, returns the full HTML body
        of a single template.

        Required scope: `templates:read`
      operationId: listTemplates
      parameters:
        - name: id
          in: query
          required: false
          description: Optional UUID to fetch a single template (with its full HTML body).
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of templates, or a single template when `?id=` is provided.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TemplatesList"
                  - $ref: "#/components/schemas/TemplateDetail"
              examples:
                list:
                  summary: List response (no id parameter)
                  value:
                    userId: 00000000-0000-0000-0000-000000000001
                    templates:
                      - templateId: a451ecdf-3899-4579-b860-e855a64d2411
                        name: Courrier à un confrère
                        language: fr
                        createdAt: "2026-05-12T09:14:33.123Z"
                        updatedAt: "2026-05-20T17:02:48.901Z"
                single:
                  summary: Single template (with ?id=)
                  value:
                    templateId: a451ecdf-3899-4579-b860-e855a64d2411
                    name: Courrier à un confrère
                    html: "<h2>Courrier à un confrère</h2><p>Cher confrère, ...</p>"
                    language: fr
                    createdAt: "2026-05-12T09:14:33.123Z"
                    updatedAt: "2026-05-20T17:02:48.901Z"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

    post:
      tags: [Templates]
      summary: Create a new template (AI-generated, HDS-hosted)
      description: |
        Creates a new template. The HTML body is generated server-side by an
        internal HDS-hosted AI from the high-level inputs you provide.

        Required scope: `templates:write`
      operationId: createTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateRequest"
            example:
              name: Compte-rendu de consultation
              profession: Médecin généraliste
              language: fr
              objective: Rédiger un compte-rendu après une consultation patient
              audience: Le patient et son médecin référent
              tone: professional
              length: medium
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTemplateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "name is required" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/ServerError" }

    put:
      tags: [Templates]
      summary: Update a template (save edits from an editor)
      description: |
        Updates an existing template — typically used to **save edits** made in
        a TipTap-style editor (variables, date tokens, formatting). The full
        new HTML body replaces the previous one; partial updates of `name` and
        `language` are also supported.

        Required scope: `templates:write`
      operationId: updateTemplate
      parameters:
        - name: id
          in: query
          required: true
          description: UUID of the template to update.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateRequest"
            example:
              html: "<h2>Compte-rendu</h2><p>Patient : <span data-vodical-variable=\"true\" data-id=\"var_x\" data-name=\"Nom\" data-variable-type=\"person-name\">[Nom]</span></p>"
              name: "Compte-rendu (v2)"
              language: fr
      responses:
        "200":
          description: Template updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTemplateResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                missing-id:   { value: { error: "Missing template id" } }
                missing-html: { value: { error: "html is required" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Template not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Template not found" }
        "500": { $ref: "#/components/responses/ServerError" }

    delete:
      tags: [Templates]
      summary: Delete a template
      description: |
        Permanently deletes the template identified by `?id=<uuid>`. Documents
        previously generated from this template are unaffected.

        Required scope: `templates:write`
      operationId: deleteTemplate
      parameters:
        - name: id
          in: query
          required: true
          description: UUID of the template to delete.
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Template deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
              example: { success: true, message: "Template deleted" }
        "400":
          description: Missing template id
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example: { error: "Missing template id" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/ServerError" }

  /api-v1-generate:
    post:
      tags: [Documents]
      summary: Generate a document from a template + inputs
      description: |
        The main endpoint of the API. Combines a template with **any mix** of
        text, audio, image, or document inputs, and returns the generated
        document either as HTML (recommended) or PDF (basic fallback).

        Pipeline:
          1. Audio → speech-to-text via internal HDS-hosted AI (FR by default),
             processed up to 5 min.
          2. Image / Document → text via the internal extract-text-source
             function (OCR for images, native text for PDFs).
          3. Text → used as-is.
          4. Combined text + template instructions → internal HDS-hosted
             generative AI with a strict prompt that forbids extrapolation.
          5. AI returns HTML using a restricted set of tags.
          6. Date tokens are replaced with the current localized date.

        Required scope: `documents:write`
      operationId: generateDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
            examples:
              text-only:
                summary: Text input only
                value:
                  templateId: a451ecdf-3899-4579-b860-e855a64d2411
                  outputFormat: html
                  inputs:
                    - type: text
                      label: notes
                      content: "Patient John Doe, 45 ans, douleur lombaire."
              multi-input:
                summary: Mix of text + audio + image + PDF
                value:
                  templateId: a451ecdf-3899-4579-b860-e855a64d2411
                  outputFormat: html
                  inputs:
                    - { type: text,     label: transcript, content: "Consultation du 03/06/2026" }
                    - { type: audio,    label: rec.m4a,    data: "<base64>" }
                    - { type: image,    label: scan.jpg,   data: "<base64>", mimeType: image/jpeg }
                    - { type: document, label: labs.pdf,   data: "<base64>", mimeType: application/pdf }
      responses:
        "200":
          description: Generation succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"
              example:
                documentId: 1425bedf-2908-4abb-88c9-885641c0ef63
                templateName: Courrier à un confrère
                html: "<h2>Courrier à un confrère</h2><p>Cher confrère, ...</p>"
                sources:
                  rec.m4a: "Bonjour docteur, ça va bien..."
                  labs.pdf: "Hémoglobine: 14 g/dL..."
            application/pdf:
              schema:
                type: string
                format: binary
              description: |
                Returned only when outputFormat is "pdf". The server-side PDF
                is basic (no embedded fonts, no styling). Prefer "html" and
                convert client-side with the bundled pdf-lib pipeline.
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                missing-template:    { value: { error: "templateId is required" } }
                empty-inputs:        { value: { error: "At least one input is required" } }
                invalid-type:        { value: { error: "Invalid input type: foo" } }
                missing-content:     { value: { error: "Text input requires \"content\" field" } }
                missing-data:        { value: { error: "audio input requires \"data\" field (base64)" } }
                empty-template:      { value: { error: "Template has no instructions/content" } }
                no-text-extracted:   { value: { error: "No text could be extracted from inputs" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden (insufficient scope, or cross-user template access)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                insufficient-scope:
                  value: { error: "Insufficient permissions. Required scope: documents:write" }
                cross-user:
                  value: { error: "Template belongs to a different user" }
        "404":
          description: Template not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example:
                error: "Template a451ecdf-3899-4579-b860-e855a64d2411 does not exist"
        "500": { $ref: "#/components/responses/ServerError" }

  /api-v1-transcribe:
    post:
      tags: [Transcriptions]
      summary: Transcribe an audio file (no AI document generation)
      description: |
        Audio-only transcription endpoint. Uploads the provided audio to the
        internal HDS-hosted speech-to-text engine and returns the transcript
        as plain text (and, when `speakerLabels` is enabled, as an array of
        diarized segments matching Vodical's `speakers_data` shape).

        This endpoint does **not** invoke the AI document generator and does
        **not** require a `templateId`. Use it when you only need a
        transcript, e.g. to display it to the user, copy it to the clipboard,
        or feed it back as a `text` input into `POST /api-v1-generate`.

        Audio is processed up to 5 min by default. Supported input encodings:
        any container/codec accepted by AssemblyAI (mp3, m4a, wav, webm,
        ogg, flac, …) — pass the raw bytes base64-encoded.

        Required scope: `transcriptions:write`

        > Backwards compat: API keys minted before v1.2.0 also work — they
        > were auto-granted the new scope by the migration.
      operationId: transcribeAudio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscribeRequest"
            example:
              audio: "<base64 of rec.m4a>"
              language: fr
              label: rec.m4a
              speakerLabels: true
      responses:
        "200":
          description: Transcription succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"
              example:
                transcriptionId: 8c4b0d22-44e0-4d6f-9b71-9f0db34e4c91
                text: "Bonjour docteur. Bonjour, comment allez-vous ? …"
                speakers:
                  - { speaker: "A", text: "Bonjour docteur." }
                  - { speaker: "B", text: "Bonjour, comment allez-vous ?" }
                language: fr
                durationSeconds: 42
                createdAt: "2026-06-04T19:20:11.000Z"
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                missing-audio:    { value: { error: "audio is required (base64 string)" } }
                invalid-language: { value: { error: 'language must be "fr" or "en"' } }
                invalid-base64:   { value: { error: "audio is not valid base64" } }
                empty-audio:      { value: { error: "audio is empty" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: Forbidden (insufficient scope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              example:
                error: "Insufficient permissions. Required scope: transcriptions:write"
        "500":
          description: Internal server error (STT not configured / AssemblyAI failure / timeout)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
              examples:
                stt-not-configured: { value: { error: "Audio transcription not configured" } }
                upload-failed:      { value: { error: "AssemblyAI upload failed: 502" } }
                transcribe-error:   { value: { error: "Transcription error: invalid audio" } }
                timeout:            { value: { error: "Transcription timeout" } }

# =============================================================================
# Components
# =============================================================================
components:

  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      bearerFormat: vdc_sk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      description: |
        API key issued from the Vodical dashboard (Settings → API Keys).
        Format: `vdc_sk_` followed by 32 base62 characters (39 chars total).

  # ---------------------------------------------------------------------------
  # Reusable responses
  # ---------------------------------------------------------------------------
  responses:

    Unauthorized:
      description: Missing / invalid / expired API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            missing-header:  { value: { error: "Missing Authorization header" } }
            invalid-format:  { value: { error: "Invalid API key format. Keys must start with vdc_sk_" } }
            invalid-key:     { value: { error: "Invalid API key" } }
            expired:         { value: { error: "API key has expired" } }

    Forbidden:
      description: API keylacks the required scope, or template belongs to another user
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            insufficient-scope:
              value: { error: "Insufficient permissions. Required scope: documents:write" }
            cross-user:
              value: { error: "Template belongs to a different user" }

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { error: "Template not found" }

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            stt-not-configured: { value: { error: "Audio transcription not configured" } }
            ai-error:           { value: { error: "AI provider error: ..." } }
            generic:            { value: { error: "Generation failed" } }

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: Invalid API key

    # Templates ---------------------------------------------------------------

    TemplateSummary:
      type: object
      required: [templateId, name, language, createdAt, updatedAt]
      properties:
        templateId: { type: string, format: uuid }
        name:       { type: string, example: "Courrier à un confrère" }
        language:
          type: string
          enum: [fr, en]
          default: fr
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TemplatesList:
      type: object
      required: [userId, templates]
      properties:
        userId:    { type: string, format: uuid }
        templates:
          type: array
          items: { $ref: "#/components/schemas/TemplateSummary" }

    TemplateDetail:
      allOf:
        - $ref: "#/components/schemas/TemplateSummary"
        - type: object
          required: [html]
          properties:
            html:
              type: string
              description: Full HTML body of the template.

    CreateTemplateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          description: Display name of the template.
          example: Compte-rendu de consultation
        profession:
          type: string
          default: General
          description: |
            Used to bias the AI generation toward a domain (e.g. "Avocat",
            "Médecin généraliste", "Coach sportif").
          example: Médecin généraliste
        language:
          type: string
          enum: [fr, en]
          default: fr
        objective:
          type: string
          description: Free-form description of what the document should achieve.
        audience:
          type: string
          description: Free-form description of who will read the document.
        tone:
          type: string
          description: E.g. "professional", "friendly", "formal", "empathic".
          example: professional
        length:
          type: string
          description: E.g. "short", "medium", "long".
          example: medium

    CreateTemplateResponse:
      type: object
      required: [templateId, name, html, createdAt]
      properties:
        templateId: { type: string, format: uuid }
        name:       { type: string }
        html:
          type: string
          description: Generated HTML body (may contain variable placeholders and date tokens).
        source:
          type: string
          description: Informational identifier of the AI infrastructure (HDS-hosted) that generated the template.
          example: internal-hds-ai
        createdAt:  { type: string, format: date-time }

    UpdateTemplateRequest:
      type: object
      required: [html]
      properties:
        html:
          type: string
          description: |
            The full new TipTap HTML body. May contain
            `<span data-vodical-variable="true" …>` and
            `<span data-vodical-token="date" …>` nodes. Replaces the previous
            body in full (no partial diff).
        name:
          type: string
          description: Optional new display name. Trimmed; ignored if empty.
        language:
          type: string
          enum: [fr, en]
          description: Optional new language code.

    UpdateTemplateResponse:
      type: object
      required: [templateId, name, html, language, updatedAt]
      properties:
        templateId: { type: string, format: uuid }
        name:       { type: string }
        html:       { type: string }
        language:
          type: string
          enum: [fr, en]
        updatedAt:  { type: string, format: date-time }

    # Document generation -----------------------------------------------------

    InputType:
      type: string
      enum: [text, audio, image, document]

    InputItem:
      type: object
      required: [type]
      properties:
        type:    { $ref: "#/components/schemas/InputType" }
        label:
          type: string
          description: |
            Human-readable label (e.g. "rec.m4a"). Echoed back in `sources`
            of the response. Defaults to "{type}_{n}" if omitted.
          example: rec.m4a
        content:
          type: string
          description: Plain UTF-8 text. **Required when `type` is `text`.**
        data:
          type: string
          format: byte
          description: |
            Standard base64 (no `data:` prefix). **Required when `type` is
            `audio`, `image`, or `document`.**
        mimeType:
          type: string
          description: |
            Recommended for `image` and `document`. E.g. `application/pdf`,
            `image/jpeg`, `image/png`, `image/webp`.
      oneOf:
        - title: Text input
          required: [type, content]
          properties:
            type: { const: text }
        - title: Audio input
          required: [type, data]
          properties:
            type: { const: audio }
        - title: Image input
          required: [type, data]
          properties:
            type: { const: image }
        - title: Document input
          required: [type, data]
          properties:
            type: { const: document }

    GenerateRequest:
      type: object
      required: [templateId, inputs]
      properties:
        templateId:
          type: string
          format: uuid
          description: Must reference a template owned by the authenticated user.
        outputFormat:
          type: string
          enum: [html, pdf]
          default: html
          description: |
            `"html"` (recommended) returns JSON with the generated HTML.
            `"pdf"` returns a basic PDF binary — prefer client-side rendering.
        inputs:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/InputItem" }
          description: |
            Combine any number of text, audio, image, document inputs. The
            server extracts text from each, concatenates them, and feeds the
            combined corpus to the AI generator.

    GenerateResponse:
      type: object
      required: [documentId, templateName, html]
      properties:
        documentId:
          type: string
          format: uuid
          description: Unique ID for this generation (use it for filenames / audit logs).
        templateName:
          type: string
          description: Mirrors the template's `name`.
        html:
          type: string
          description: |
            Generated document. Cleaned of Markdown code fences. Date tokens
            already substituted with the localized current date.
        sources:
          type: object
          description: |
            For each input that produced text, the extracted text indexed by
            its `label`. Useful for transparency, audit trails, or showing
            users what the AI saw.
          additionalProperties:
            type: string
          example:
            rec.m4a: "Bonjour docteur, ça va bien..."
            labs.pdf: "Hémoglobine: 14 g/dL..."

    # Transcriptions ----------------------------------------------------------

    SpeakerSegment:
      type: object
      required: [speaker, text]
      properties:
        speaker:
          type: string
          description: |
            Diarization label assigned by the speech-to-text engine — typically
            a single uppercase letter (`"A"`, `"B"`, `"C"`, …). Adjacent
            utterances by the same speaker are merged into a single segment.
          example: A
        text:
          type: string
          description: Concatenated text spoken by this speaker for the segment.
          example: Bonjour docteur, comment allez-vous ?

    TranscribeRequest:
      type: object
      required: [audio]
      properties:
        audio:
          type: string
          format: byte
          description: |
            Base64-encoded audio bytes (no `data:` prefix). Any container/codec
            accepted by AssemblyAI works (mp3, m4a, wav, webm, ogg, flac, …).
        language:
          type: string
          enum: [fr, en]
          default: fr
          description: ISO language code passed to the speech-to-text engine.
        label:
          type: string
          description: |
            Optional human-readable label (e.g. `"rec.m4a"`). Stored on the
            audit row in `document_requests.metadata`. Has no effect on
            transcription quality.
          example: rec.m4a
        speakerLabels:
          type: boolean
          default: true
          description: |
            When `true`, runs speaker diarization. The response includes a
            grouped `speakers[]` array (one entry per consecutive run by the
            same speaker). Set to `false` for monologue-style audio to save a
            small amount of processing time.

    TranscribeResponse:
      type: object
      required: [transcriptionId, text, language, durationSeconds, createdAt]
      properties:
        transcriptionId:
          type: string
          format: uuid
          description: |
            UUID of the audit row in `document_requests` for this transcription.
            Use it as a stable identifier for filenames, logs, or de-duplication.
        text:
          type: string
          description: Plain-text transcript (no speaker prefixes).
        speakers:
          type: array
          description: |
            Diarized segments, present when `speakerLabels` was `true` and the
            engine detected at least one speaker. Same shape as Vodical's
            `speakers_data` / `speaker_segments`. Empty (or omitted) for
            speakerless results.
          items:
            $ref: "#/components/schemas/SpeakerSegment"
        language:
          type: string
          enum: [fr, en]
          description: Echoes back the language code the transcription was run with.
        durationSeconds:
          type: number
          description: Duration of the audio in seconds (as reported by the engine).
          example: 42.7
        createdAt:
          type: string
          format: date-time
          description: ISO timestamp at which the transcription completed.
